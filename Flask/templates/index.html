<!DOCTYPE html>
<html>
<head>
    <title>Human Development Index</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: url('https://i.imgur.com/3ZQ3ZQm.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .title {
            text-align: center;
            color: red;
            font-size: 40px;
            font-weight: bold;
            margin-top: 20px;
        }

        .container {
            width: 420px;
            margin: auto;
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px #000;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }

        h2 {
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="title">Human Development Index</div>

<div class="container">

    <form action="/predict" method="POST">

        <h2>Select Country</h2>
        <select name="country">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Germany</option>
            <option>Japan</option>
        </select>

        <input type="text" name="feature1" placeholder="HDI Rank (2021)" required>
        <input type="text" name="feature2" placeholder="HDI Value 2018" required>
        <input type="text" name="feature3" placeholder="HDI Value 2019" required>
        <input type="text" name="feature4" placeholder="HDI Value 2020" required>

        <button type="submit">Predict</button>

    </form>

</div>

</body>
</html>
